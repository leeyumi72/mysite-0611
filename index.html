<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Hub — AI 서비스 모음</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:        #0d1117;
      --bg-nav:    rgba(13,17,23,0.92);
      --bg-side:   #0d1117;
      --bg-card:   #161b22;
      --border:    #21262d;
      --primary:   #7c6af8;
      --primary-h: #6254d4;
      --accent:    #a5b4fc;
      --text:      #e6edf3;
      --muted:     #7d8590;
      --glow:      rgba(124,106,248,0.18);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── TOP NAV ── */
    .top-nav {
      position: fixed; top: 0; left: 0; right: 0; height: 58px;
      background: var(--bg-nav);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; padding: 0 24px;
      z-index: 200; gap: 32px;
    }
    .logo {
      font-size: 1.15rem; font-weight: 800; letter-spacing: -0.5px;
      background: linear-gradient(135deg, #a5b4fc, #7c6af8);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      white-space: nowrap; flex-shrink: 0;
    }
    .logo span { font-size: 1.1rem; }

    .nav-list { display: flex; gap: 4px; list-style: none; }
    .nav-item {
      padding: 7px 14px; border-radius: 8px;
      cursor: pointer; color: var(--muted);
      font-size: 0.85rem; font-weight: 500;
      transition: all 0.18s; white-space: nowrap;
      display: flex; align-items: center; gap: 6px;
    }
    .nav-item:hover { background: rgba(124,106,248,0.1); color: var(--text); }
    .nav-item.active {
      background: var(--primary); color: #fff;
      box-shadow: 0 0 14px rgba(124,106,248,0.4);
    }
    .nav-item .emoji { font-size: 1rem; }

    /* ── LAYOUT ── */
    .layout {
      display: flex;
      margin-top: 58px;
      min-height: calc(100vh - 58px);
    }

    /* ── SIDEBAR ── */
    .sidebar {
      width: 210px; flex-shrink: 0;
      background: var(--bg-side);
      border-right: 1px solid var(--border);
      padding: 20px 10px;
      position: sticky; top: 58px;
      height: calc(100vh - 58px);
      overflow-y: auto;
    }
    .sidebar::-webkit-scrollbar { width: 4px; }
    .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .sidebar-label {
      font-size: 0.68rem; font-weight: 600;
      color: var(--muted); text-transform: uppercase;
      letter-spacing: 1.2px; padding: 0 10px; margin-bottom: 6px;
    }
    .sidebar-item {
      padding: 9px 12px; border-radius: 8px;
      cursor: pointer; color: var(--muted);
      font-size: 0.84rem; transition: all 0.16s;
      margin-bottom: 2px; line-height: 1.3;
    }
    .sidebar-item:hover { background: rgba(124,106,248,0.08); color: var(--text); }
    .sidebar-item.active {
      background: rgba(124,106,248,0.15);
      color: var(--accent); font-weight: 600;
      border-left: 3px solid var(--primary);
    }

    /* ── MAIN ── */
    .main { flex: 1; padding: 28px 32px; overflow-y: auto; }

    .section-head { margin-bottom: 24px; }
    .section-head h2 { font-size: 1.45rem; font-weight: 700; margin-bottom: 4px; }
    .section-head p  { color: var(--muted); font-size: 0.85rem; }

    /* ── CARD GRID ── */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 14px;
    }

    /* ── CARD ── */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 14px; padding: 18px;
      text-decoration: none; color: inherit;
      display: flex; flex-direction: column; gap: 10px;
      transition: all 0.2s; position: relative; overflow: hidden;
    }
    .card::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(135deg, transparent 60%, var(--glow));
      opacity: 0; transition: opacity 0.2s;
    }
    .card:hover {
      border-color: var(--primary);
      transform: translateY(-3px);
      box-shadow: 0 8px 28px rgba(124,106,248,0.18);
    }
    .card:hover::after { opacity: 1; }

    .card-icon {
      width: 46px; height: 46px; border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.5rem; flex-shrink: 0;
    }
    .card-name { font-size: 0.97rem; font-weight: 700; }
    .card-desc { font-size: 0.78rem; color: var(--muted); line-height: 1.55; flex: 1; }
    .card-footer { display: flex; align-items: center; justify-content: space-between; }
    .card-tag {
      display: inline-block; padding: 3px 9px;
      border-radius: 100px; font-size: 0.68rem; font-weight: 600;
      background: rgba(124,106,248,0.15); color: var(--accent);
    }
    .card-arrow { color: var(--muted); font-size: 0.8rem; transition: transform 0.2s; }
    .card:hover .card-arrow { transform: translateX(3px); color: var(--accent); }

    /* subcat divider */
    .subcat-title {
      font-size: 0.78rem; font-weight: 700;
      color: var(--muted); text-transform: uppercase;
      letter-spacing: 1px; margin: 22px 0 10px;
      padding-bottom: 6px; border-bottom: 1px solid var(--border);
    }
    .subcat-title:first-child { margin-top: 0; }

    @media (max-width: 768px) {
      .sidebar { display: none; }
      .main { padding: 20px 16px; }
      .nav-item .emoji { display: none; }
    }
  </style>
</head>

let currentCat = 'chatbot';
let currentSub = null;

function renderSidebar(cat) {
  const el = document.getElementById('sidebarItems');
  const subs = Object.keys(DATA[cat].subs);
  el.innerHTML = '';

  const all = div('sidebar-item' + (currentSub === null ? ' active' : ''), '전체');
  all.onclick = () => selectSub(null);
  el.appendChild(all);

  subs.forEach(s => {
    const item = div('sidebar-item' + (currentSub === s ? ' active' : ''), s);
    item.onclick = () => selectSub(s);
    el.appendChild(item);
  });
}

function renderCards(cat, sub) {
  const container = document.getElementById('cardsContainer');
  container.innerHTML = '';

  const subs = DATA[cat].subs;
  const keys = sub ? [sub] : Object.keys(subs);

  keys.forEach(k => {
    if (!sub) {
      const title = div('subcat-title', k);
      container.appendChild(title);
    }
    const grid = document.createElement('div');
    grid.className = 'cards-grid';
    subs[k].forEach(c => {
      const a = document.createElement('a');
      a.className = 'card';
      a.href = c.url;
      a.target = '_blank';
      a.rel = 'noopener noreferrer';
      a.innerHTML = `
        <div class="card-icon" style="background:${c.bg}">${c.icon}</div>
        <div class="card-name">${c.name}</div>
        <div class="card-desc">${c.desc}</div>
        <div class="card-footer">
          <span class="card-tag">${c.tag}</span>
          <span class="card-arrow">→</span>
        </div>`;
      grid.appendChild(a);
    });
    container.appendChild(grid);
  });
}

function selectCat(cat) {
  currentCat = cat; currentSub = null;
  document.querySelectorAll('.nav-item').forEach(el =>
    el.classList.toggle('active', el.dataset.cat === cat));
  document.getElementById('sectionTitle').textContent = DATA[cat].title;
  document.getElementById('sectionDesc').textContent  = DATA[cat].desc;
  renderSidebar(cat);
  renderCards(cat, null);
}

function selectSub(sub) {
  currentSub = sub;
  document.querySelectorAll('.sidebar-item').forEach(el =>
    el.classList.toggle('active', el.textContent === (sub || '전체')));
  document.getElementById('sectionTitle').textContent = sub || DATA[currentCat].title;
  renderCards(currentCat, sub);
}

function div(cls, text) {
  const el = document.createElement('div');
  el.className = cls; el.textContent = text; return el;
}

document.querySelectorAll('.nav-item').forEach(el =>
  el.addEventListener('click', () => selectCat(el.dataset.cat)));

selectCat('chatbot');
</script>
