<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Hub — AI 서비스 모음</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0d1117; --bg-nav: rgba(13,17,23,0.95); --bg-side: #0d1117;
      --bg-card: #161b22; --border: #21262d; --primary: #7c6af8;
      --accent: #a5b4fc; --text: #e6edf3; --muted: #7d8590;
      --glow: rgba(124,106,248,0.18); --nav-h: 58px; --search-h: 46px;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* ── TOP NAV ── */
    .top-nav {
      position: fixed; top: 0; left: 0; right: 0; height: var(--nav-h);
      background: var(--bg-nav); backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; padding: 0 20px;
      z-index: 200; gap: 20px; overflow-x: auto;
    }
    .top-nav::-webkit-scrollbar { display: none; }
    .logo {
      font-size: 1.1rem; font-weight: 800; letter-spacing: -0.5px;
      background: linear-gradient(135deg, #a5b4fc, #7c6af8);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      white-space: nowrap; flex-shrink: 0;
    }
    .nav-list { display: flex; gap: 3px; list-style: none; }
    .nav-item {
      padding: 6px 12px; border-radius: 8px; cursor: pointer;
      color: var(--muted); font-size: 0.82rem; font-weight: 500;
      transition: all 0.18s; white-space: nowrap;
    }
    .nav-item:hover { background: rgba(124,106,248,0.1); color: var(--text); }
    .nav-item.active { background: var(--primary); color: #fff; box-shadow: 0 0 14px rgba(124,106,248,0.35); }
    .nav-item.bm-nav.active { background: #92400e; box-shadow: 0 0 14px rgba(251,191,36,0.35); }

    /* ── SEARCH BAR (below nav) ── */
    .search-bar {
      position: fixed; top: var(--nav-h); left: 0; right: 0; height: var(--search-h);
      background: rgba(13,17,23,0.97); backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; padding: 0 20px; gap: 12px;
      z-index: 190;
    }
    .search-wrap { position: relative; flex: 1; max-width: 480px; }
    .search-wrap svg { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: var(--muted); pointer-events: none; }
    .search-input {
      width: 100%; padding: 8px 12px 8px 32px;
      background: rgba(255,255,255,0.06); border: 1px solid var(--border);
      border-radius: 20px; color: var(--text); font-size: 0.83rem;
      outline: none; transition: border-color 0.18s;
    }
    .search-input:focus { border-color: var(--primary); background: rgba(124,106,248,0.06); }
    .search-input::placeholder { color: var(--muted); }
    .search-count { font-size: 0.75rem; color: var(--muted); white-space: nowrap; }

    /* ── LAYOUT ── */
    .layout {
      display: flex;
      margin-top: calc(var(--nav-h) + var(--search-h));
      min-height: calc(100vh - var(--nav-h) - var(--search-h));
    }

    /* ── SIDEBAR ── */
    .sidebar {
      width: 200px; flex-shrink: 0; background: var(--bg-side);
      border-right: 1px solid var(--border);
      position: sticky; top: calc(var(--nav-h) + var(--search-h));
      height: calc(100vh - var(--nav-h) - var(--search-h));
      display: flex; flex-direction: column; overflow: hidden;
    }
    .sidebar-cats {
      flex: 1; overflow-y: auto; min-height: 0;
      padding: 14px 10px 8px;
    }
    .sidebar-cats::-webkit-scrollbar { width: 3px; }
    .sidebar-cats::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .sidebar-filters {
      flex-shrink: 0; padding: 10px 10px 16px;
      border-top: 1px solid var(--border);
    }
    .sidebar-label {
      font-size: 0.66rem; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: 1.2px;
      padding: 0 8px; margin-bottom: 6px;
    }
    .sidebar-item {
      padding: 8px 10px; border-radius: 8px; cursor: pointer;
      color: var(--muted); font-size: 0.82rem; transition: all 0.16s;
      margin-bottom: 2px;
    }
    .sidebar-item:hover { background: rgba(124,106,248,0.08); color: var(--text); }
    .sidebar-item.active {
      background: rgba(124,106,248,0.15); color: var(--accent);
      font-weight: 600; border-left: 3px solid var(--primary);
    }

    /* ── FILTERS ── */
    .filter-opts { display: flex; flex-direction: column; gap: 2px; margin-top: 6px; }
    .filter-opt {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 10px; border-radius: 8px; cursor: pointer;
      color: var(--muted); font-size: 0.81rem; transition: all 0.16s; user-select: none;
    }
    .filter-opt:hover { background: rgba(124,106,248,0.08); color: var(--text); }
    .filter-opt.active { background: rgba(124,106,248,0.15); color: var(--accent); }
    .fchk {
      width: 14px; height: 14px; border-radius: 4px; flex-shrink: 0;
      border: 1.5px solid var(--muted); display: flex;
      align-items: center; justify-content: center; font-size: 0.6rem; transition: all 0.16s;
    }
    .filter-opt.active .fchk { background: var(--primary); border-color: var(--primary); color: #fff; }

    /* ── MAIN ── */
    .main { flex: 1; padding: 24px 26px; overflow-y: auto; }
    .section-head { margin-bottom: 20px; }
    .section-head h2 { font-size: 1.35rem; font-weight: 700; margin-bottom: 3px; }
    .section-head p { color: var(--muted); font-size: 0.83rem; }
    .subcat-title {
      font-size: 0.74rem; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: 1px;
      margin: 22px 0 10px; padding-bottom: 6px; border-bottom: 1px solid var(--border);
    }
    .subcat-title:first-child { margin-top: 0; }

    /* ── CARD GRID ── */
    .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(205px, 1fr)); gap: 12px; }

    /* ── CARD ── */
    .card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 14px; padding: 16px; text-decoration: none; color: inherit;
      display: flex; flex-direction: column; gap: 8px;
      transition: all 0.2s; position: relative; overflow: hidden;
    }
    .card::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(135deg, transparent 60%, var(--glow));
      opacity: 0; transition: opacity 0.2s;
    }
    .card:hover { border-color: var(--primary); transform: translateY(-3px); box-shadow: 0 8px 28px rgba(124,106,248,0.18); }
    .card:hover::after { opacity: 1; }

    .card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 6px; }
    .card-icon {
      width: 42px; height: 42px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; overflow: hidden; font-size: 1.3rem;
    }
    .card-favicon { width: 28px; height: 28px; object-fit: contain; display: block; }
    .bm-btn {
      background: none; border: none; cursor: pointer;
      font-size: 1rem; color: var(--muted); padding: 2px;
      line-height: 1; transition: all 0.2s; flex-shrink: 0; position: relative; z-index: 1;
    }
    .bm-btn:hover { color: #fbbf24; transform: scale(1.25); }
    .bm-btn.active { color: #fbbf24; }

    .card-name { font-size: 0.93rem; font-weight: 700; }
    .card-stars { font-size: 0.8rem; letter-spacing: 1px; line-height: 1; }
    .card-desc { font-size: 0.76rem; color: var(--muted); line-height: 1.55; flex: 1; }
    .card-footer { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 4px; }
    .card-tag {
      padding: 2px 8px; border-radius: 100px; font-size: 0.67rem; font-weight: 600;
      background: rgba(124,106,248,0.15); color: var(--accent);
    }
    .filter-badges { display: flex; flex-wrap: wrap; gap: 3px; }
    .fbadge {
      padding: 2px 6px; border-radius: 100px; font-size: 0.62rem; font-weight: 600;
    }
    .fbadge.free { background: rgba(34,197,94,.15); color: #4ade80; }
    .fbadge.ko   { background: rgba(239,68,68,.15);  color: #f87171; }
    .fbadge.api  { background: rgba(14,165,233,.15); color: #38bdf8; }
    .fbadge.oss  { background: rgba(245,158,11,.15); color: #fbbf24; }
    .card-arrow { color: var(--muted); font-size: 0.78rem; transition: transform 0.2s; flex-shrink: 0; }
    .card:hover .card-arrow { transform: translateX(3px); color: var(--accent); }

    /* ── EMPTY STATE ── */
    .empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }
    .empty-state .es-icon { font-size: 3rem; margin-bottom: 14px; }
    .empty-state h3 { color: var(--text); margin-bottom: 8px; font-size: 1.05rem; }
    .empty-state p { font-size: 0.83rem; line-height: 1.7; }

    @media (max-width: 768px) {
      .sidebar { display: none; }
      .main { padding: 16px 14px; }
      .search-bar { padding: 0 14px; }
    }
  </style>
</head>

// ── STATE ──
let currentCat = 'bookmarks';
let currentSub = null;
let searchQuery = '';
let activeFilters = new Set();
let bookmarks = new Set(JSON.parse(localStorage.getItem('ai_hub_bm') || '[]'));

function getAllCards() {
  const all = [];
  Object.values(DATA).forEach(cat => Object.values(cat.subs).forEach(arr => all.push(...arr)));
  return all;
}

function applyFiltersAndSearch(cards) {
  return cards.filter(c => {
    if (searchQuery) {
      const q = searchQuery.toLowerCase();
      if (!c.name.toLowerCase().includes(q) && !c.desc.toLowerCase().includes(q)) return false;
    }
    for (const f of activeFilters) {
      if (!c.filters.includes(f)) return false;
    }
    return true;
  });
}

// ── RENDER SIDEBAR ──
function renderSidebar(cat) {
  const el = document.getElementById('sidebarCats');
  let html = '';
  if (cat !== 'bookmarks') {
    html += `<div class="sidebar-item ${currentSub===null?'active':''}" data-sub="__all">전체</div>`;
    Object.keys(DATA[cat].subs).forEach(s => {
      html += `<div class="sidebar-item ${currentSub===s?'active':''}" data-sub="${s}">${s}</div>`;
    });
  }
  el.innerHTML = html;
  el.querySelectorAll('.sidebar-item[data-sub]').forEach(item => {
    item.onclick = () => selectSub(item.dataset.sub === '__all' ? null : item.dataset.sub);
  });
}

// ── MAKE CARD ──
function makeCard(c) {
  const a = document.createElement('a');
  a.className = 'card';
  a.href = c.url; a.target = '_blank'; a.rel = 'noopener noreferrer';

  const isBm = bookmarks.has(c.name);
  const s = STARS[c.name] || 3;
  const starHtml = stars(s);
  const badges = c.filters.map(f => {
    const L = {free:'무료',ko:'한국어',api:'API',oss:'오픈소스'};
    return `<span class="fbadge ${f}">${L[f]}</span>`;
  }).join('');

  a.innerHTML = `
    <div class="card-top">
      <div class="card-icon" style="background:${c.bg}">
        <img class="card-favicon" src="${FAVICON(c.domain)}" alt="${c.name}">
      </div>
      <button class="bm-btn ${isBm?'active':''}" title="즐겨찾기">★</button>
    </div>
    <div class="card-name">${c.name}</div>
    <div class="card-stars">${starHtml}</div>
    <div class="card-desc">${c.desc}</div>
    <div class="card-footer">
      <div class="filter-badges">${badges || `<span class="card-tag">${c.tag}</span>`}</div>
      <span class="card-arrow">→</span>
    </div>`;

  const img = a.querySelector('.card-favicon');
  img.onerror = () => {
    img.style.display = 'none';
    const sp = document.createElement('span');
    sp.textContent = c.icon; sp.style.cssText = 'font-size:1.3rem';
    img.parentNode.appendChild(sp);
  };

  const btn = a.querySelector('.bm-btn');
  btn.onclick = e => {
    e.preventDefault(); e.stopPropagation();
    if (bookmarks.has(c.name)) { bookmarks.delete(c.name); btn.classList.remove('active'); }
    else { bookmarks.add(c.name); btn.classList.add('active'); }
    localStorage.setItem('ai_hub_bm', JSON.stringify([...bookmarks]));
    if (currentCat === 'bookmarks') renderCards('bookmarks', null);
  };
  return a;
}

// ── RENDER CARDS ──
function renderCards(cat, sub) {
  const container = document.getElementById('cardsContainer');
  container.innerHTML = '';
  let total = 0;

  if (cat === 'bookmarks') {
    const cards = applyFiltersAndSearch(getAllCards().filter(c => bookmarks.has(c.name)));
    total = cards.length;
    if (!cards.length) {
      container.innerHTML = `<div class="empty-state">
        <div class="es-icon">⭐</div>
        <h3>즐겨찾기가 없습니다</h3>
        <p>각 카드의 <strong>★</strong> 버튼을 눌러<br>자주 사용하는 서비스를 추가해보세요</p>
      </div>`;
    } else {
      const grid = document.createElement('div');
      grid.className = 'cards-grid';
      cards.forEach(c => grid.appendChild(makeCard(c)));
      container.appendChild(grid);
    }
  } else {
    const subs = DATA[cat].subs;
    const keys = sub ? [sub] : Object.keys(subs);
    let hasAny = false;
    keys.forEach(k => {
      const cards = applyFiltersAndSearch(subs[k]);
      if (!cards.length) return;
      total += cards.length; hasAny = true;
      if (!sub) { const t = document.createElement('div'); t.className='subcat-title'; t.textContent=k; container.appendChild(t); }
      const grid = document.createElement('div'); grid.className = 'cards-grid';
      cards.forEach(c => grid.appendChild(makeCard(c)));
      container.appendChild(grid);
    });
    if (!hasAny) {
      container.innerHTML = `<div class="empty-state">
        <div class="es-icon">🔍</div><h3>검색 결과가 없습니다</h3>
        <p>다른 검색어나 필터를 시도해보세요</p>
      </div>`;
    }
  }

  const countEl = document.getElementById('searchCount');
  countEl.textContent = (searchQuery || activeFilters.size) ? `${total}개 결과` : '';
}

// ── SELECT CATEGORY ──
function selectCat(cat) {
  currentCat = cat; currentSub = null;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.toggle('active', el.dataset.cat === cat));
  if (cat === 'bookmarks') {
    document.getElementById('sectionTitle').textContent = '⭐ 즐겨찾기';
    document.getElementById('sectionDesc').textContent = '북마크한 AI 서비스 모음';
  } else {
    document.getElementById('sectionTitle').textContent = DATA[cat].title;
    document.getElementById('sectionDesc').textContent = DATA[cat].desc;
  }
  renderSidebar(cat);
  renderCards(cat, null);
}

// ── SELECT SUB ──
function selectSub(sub) {
  currentSub = sub;
  document.querySelectorAll('#sidebarCats .sidebar-item').forEach(el => {
    el.classList.toggle('active', (el.dataset.sub === '__all' ? null : el.dataset.sub) === sub);
  });
  document.getElementById('sectionTitle').textContent = sub || DATA[currentCat].title;
  renderCards(currentCat, sub);
}

// ── SEARCH ──
document.getElementById('globalSearch').oninput = e => {
  searchQuery = e.target.value;
  renderCards(currentCat, currentSub);
};

// ── FILTERS ──
document.querySelectorAll('.filter-opt[data-f]').forEach(el => {
  el.onclick = () => {
    const f = el.dataset.f;
    const cb = el.querySelector('.fchk');
    if (activeFilters.has(f)) { activeFilters.delete(f); el.classList.remove('active'); cb.textContent=''; }
    else { activeFilters.add(f); el.classList.add('active'); cb.textContent='✓'; }
    renderCards(currentCat, currentSub);
  };
});

// ── NAV ──
document.querySelectorAll('.nav-item').forEach(el =>
  el.addEventListener('click', () => selectCat(el.dataset.cat)));

// ── INIT ──
selectCat(bookmarks.size > 0 ? 'bookmarks' : 'chatbot');
</script>
