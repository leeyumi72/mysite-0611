<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Hub — AI 서비스 모음</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg:#090e1c; --bg-nav:rgba(9,14,28,0.96); --bg-side:#090e1c;
      --bg-card:#0f1825; --border:#1c2840; --primary:#00b8d9;
      --accent:#f0006a; --text:#e6edf3; --muted:#6b7a90;
      --glow:rgba(0,184,217,0.18); --nav-h:58px; --search-h:46px;
    }
    body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

    /* NAV */
    .top-nav {
      position:fixed; top:0; left:0; right:0; height:var(--nav-h);
      background:var(--bg-nav); backdrop-filter:blur(14px);
      border-bottom:1px solid var(--border);
      display:flex; align-items:center; padding:0 16px;
      z-index:200; gap:0;
    }
    .nav-left { display:flex; align-items:center; gap:12px; flex:1; overflow-x:auto; min-width:0; padding-right:8px; }
    .nav-left::-webkit-scrollbar { display:none; }
    .logo {
      font-size:1.1rem; font-weight:800; letter-spacing:-0.5px;
      background:linear-gradient(135deg,#00b8d9,#f0006a);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent;
      white-space:nowrap; flex-shrink:0;
    }
    .nav-list { display:flex; gap:2px; list-style:none; }
    .nav-item {
      padding:6px 14px; border-radius:100px; cursor:pointer;
      color:var(--muted); font-size:0.83rem; font-weight:500;
      transition:all 0.18s; white-space:nowrap;
      border:1.5px solid transparent;
    }
    .nav-item:hover { color:var(--text); }
    .nav-item.active { background:var(--primary); color:#090e1c; font-weight:700; border-color:transparent; box-shadow:0 0 16px rgba(0,184,217,0.45); }

    /* SEARCH BAR */
    .search-bar {
      position:fixed; top:var(--nav-h); left:0; right:0; height:var(--search-h);
      background:rgba(13,17,23,0.97); backdrop-filter:blur(14px);
      border-bottom:1px solid var(--border);
      display:flex; align-items:center; padding:0 20px; gap:12px; z-index:190;
    }
    .search-wrap { position:relative; flex:1; max-width:480px; }
    .search-wrap svg { position:absolute; left:11px; top:50%; transform:translateY(-50%); color:var(--muted); pointer-events:none; }
    .search-input {
      width:100%; padding:8px 12px 8px 32px;
      background:rgba(255,255,255,0.06); border:1px solid var(--border);
      border-radius:20px; color:var(--text); font-size:0.83rem;
      outline:none; transition:border-color 0.18s;
    }
    .search-input:focus { border-color:var(--primary); background:rgba(0,184,217,0.07); }
    .search-input::placeholder { color:var(--muted); }
    .search-count { font-size:0.74rem; color:var(--muted); white-space:nowrap; }

    /* LAYOUT */
    .layout {
      display:flex;
      margin-top:calc(var(--nav-h) + var(--search-h));
      min-height:calc(100vh - var(--nav-h) - var(--search-h));
    }

    /* SIDEBAR */
    .sidebar {
      width:200px; flex-shrink:0; background:var(--bg-side);
      border-right:1px solid var(--border);
      position:sticky; top:calc(var(--nav-h) + var(--search-h));
      height:calc(100vh - var(--nav-h) - var(--search-h));
      display:flex; flex-direction:column; overflow:hidden;
    }
    .sidebar-cats { flex:1; overflow-y:auto; min-height:0; padding:14px 10px 8px; }
    .sidebar-cats::-webkit-scrollbar { width:3px; }
    .sidebar-cats::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
    .sidebar-filters { flex-shrink:0; padding:10px 10px 16px; border-top:1px solid var(--border); }
    .sidebar-label { font-size:0.66rem; font-weight:700; color:var(--accent); text-transform:uppercase; letter-spacing:1.2px; padding:0 8px; margin-bottom:6px; }
    .sidebar-item { padding:8px 10px; border-radius:8px; cursor:pointer; color:var(--muted); font-size:0.82rem; transition:all 0.16s; margin-bottom:2px; }
    .sidebar-item:hover { background:rgba(0,184,217,0.09); color:var(--text); }
    .sidebar-item.active { background:rgba(0,184,217,0.14); color:var(--primary); font-weight:600; border-left:3px solid var(--primary); }

    /* FILTER */
    .filter-opts { display:flex; flex-direction:column; gap:2px; margin-top:6px; }
    .filter-opt { display:flex; align-items:center; gap:8px; padding:6px 10px; border-radius:8px; cursor:pointer; color:var(--muted); font-size:0.81rem; transition:all 0.16s; user-select:none; }
    .filter-opt:hover { background:rgba(0,184,217,0.09); color:var(--text); }
    .filter-opt.active { background:rgba(0,184,217,0.14); color:var(--primary); }
    .fchk { width:14px; height:14px; border-radius:4px; flex-shrink:0; border:1.5px solid var(--muted); display:flex; align-items:center; justify-content:center; font-size:0.6rem; transition:all 0.16s; }
    .filter-opt.active .fchk { background:var(--primary); border-color:var(--primary); color:#fff; }

    /* MAIN */
    .main { flex:1; padding:24px 26px; overflow-y:auto; }
    .section-head { margin-bottom:20px; }
    .section-head h2 { font-size:1.35rem; font-weight:700; margin-bottom:3px; }
    .section-head p { color:var(--muted); font-size:0.83rem; }
    .subcat-title { font-size:0.74rem; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:1px; margin:22px 0 10px; padding-bottom:6px; border-bottom:1px solid var(--border); }
    .subcat-title:first-child { margin-top:0; }
    .cards-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(205px,1fr)); gap:12px; }

    /* CARD */
    .card {
      background:var(--bg-card); border:1px solid var(--border);
      border-radius:14px; padding:16px; text-decoration:none; color:inherit;
      display:flex; flex-direction:column; gap:8px;
      transition:all 0.2s; position:relative; overflow:hidden;
    }
    .card::after { content:''; position:absolute; inset:0; background:linear-gradient(135deg,transparent 60%,var(--glow)); opacity:0; transition:opacity 0.2s; }
    .card:hover { border-color:var(--primary); transform:translateY(-3px); box-shadow:0 8px 28px rgba(0,184,217,0.2); }
    .card:hover::after { opacity:1; }
    .card-top { display:flex; align-items:flex-start; justify-content:space-between; gap:6px; }
    .card-icon { width:42px; height:42px; border-radius:10px; display:flex; align-items:center; justify-content:center; flex-shrink:0; overflow:hidden; font-size:1.3rem; }
    .card-favicon { width:28px; height:28px; object-fit:contain; display:block; }
    .bm-btn { background:none; border:none; cursor:pointer; font-size:1rem; color:var(--muted); padding:2px; line-height:1; transition:all 0.2s; flex-shrink:0; position:relative; z-index:1; }
    .bm-btn:hover { color:#fbbf24; transform:scale(1.25); }
    .bm-btn.active { color:#fbbf24; }
    .card-name { font-size:0.93rem; font-weight:700; }
    .card-stars { font-size:0.62rem; letter-spacing:1.5px; opacity:0.55; }
    .card-desc { font-size:0.76rem; color:var(--muted); line-height:1.55; flex:1; }
    .card-footer { display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:4px; }
    .card-tag { padding:2px 8px; border-radius:100px; font-size:0.67rem; font-weight:600; background:rgba(240,0,106,0.12); color:var(--accent); }
    .filter-badges { display:flex; flex-wrap:wrap; gap:3px; }
    .fbadge { padding:2px 6px; border-radius:100px; font-size:0.62rem; font-weight:600; }
    .fbadge.free { background:rgba(34,197,94,.15); color:#4ade80; }
    .fbadge.ko   { background:rgba(239,68,68,.15);  color:#f87171; }
    .fbadge.api  { background:rgba(14,165,233,.15); color:#38bdf8; }
    .fbadge.oss  { background:rgba(245,158,11,.15); color:#fbbf24; }
    .card-arrow { color:var(--muted); font-size:0.78rem; transition:transform 0.2s; flex-shrink:0; }
    .card:hover .card-arrow { transform:translateX(3px); color:var(--accent); }
    .empty-state { text-align:center; padding:60px 20px; color:var(--muted); }
    .empty-state .es-icon { font-size:3rem; margin-bottom:14px; }
    .empty-state h3 { color:var(--text); margin-bottom:8px; font-size:1.05rem; }
    .empty-state p { font-size:0.83rem; line-height:1.7; }
    @media(max-width:768px) { .sidebar{display:none;} .main{padding:16px 14px;} }

    /* ADMIN */
    .admin-lock { flex-shrink:0; background:none; border:1px solid transparent; border-radius:8px; cursor:pointer; font-size:0.78rem; color:var(--muted); padding:5px 10px; display:flex; align-items:center; gap:5px; transition:all 0.18s; }
    .admin-lock:hover { color:var(--text); border-color:var(--border); }
    .admin-lock.is-admin { color:var(--primary); border-color:var(--primary); background:rgba(0,184,217,0.1); }
    .admin-bar { position:fixed; top:calc(var(--nav-h) + var(--search-h)); left:0; right:0; z-index:185; background:rgba(0,184,217,0.1); border-bottom:1px solid rgba(0,184,217,0.35); padding:7px 20px; display:flex; align-items:center; gap:10px; font-size:0.78rem; color:var(--primary); font-weight:600; }
    .admin-bar.hidden { display:none; }
    .admin-bar-info { flex:1; }
    .admin-bar-btn { background:rgba(0,184,217,0.15); border:1px solid rgba(0,184,217,0.35); border-radius:6px; color:var(--primary); font-size:0.72rem; font-weight:700; padding:3px 10px; cursor:pointer; transition:all 0.18s; }
    .admin-bar-btn:hover { background:rgba(0,184,217,0.28); }
    .admin-bar-btn.danger { background:rgba(239,68,68,0.12); border-color:rgba(239,68,68,0.3); color:#f87171; }
    .admin-bar-btn.danger:hover { background:rgba(239,68,68,0.22); }
    .admin-modal-bg { position:fixed; inset:0; background:rgba(0,0,0,0.75); backdrop-filter:blur(8px); z-index:600; display:flex; align-items:center; justify-content:center; }
    .admin-modal-bg.hidden { display:none; }
    .admin-box { background:#111827; border:1px solid var(--border); border-radius:18px; padding:32px 28px; width:340px; box-shadow:0 20px 60px rgba(0,0,0,0.5); }
    .admin-box h3 { font-size:1.1rem; font-weight:800; margin-bottom:6px; }
    .admin-box p { color:var(--muted); font-size:0.82rem; margin-bottom:20px; line-height:1.6; }
    .admin-input { width:100%; padding:10px 14px; background:rgba(255,255,255,0.05); border:1px solid var(--border); border-radius:10px; color:var(--text); font-size:0.9rem; outline:none; margin-bottom:12px; transition:border-color 0.18s; }
    .admin-input:focus { border-color:var(--primary); }
    .admin-input.error { border-color:#ef4444; }
    .admin-submit { width:100%; padding:11px; background:var(--primary); color:#0a0f1e; border:none; border-radius:10px; font-size:0.9rem; font-weight:800; cursor:pointer; transition:opacity 0.18s; }
    .admin-submit:hover { opacity:0.85; }
    .admin-cancel { width:100%; padding:9px; background:rgba(255,255,255,0.05); border:1px solid var(--border); border-radius:10px; color:var(--muted); font-size:0.85rem; cursor:pointer; margin-top:8px; transition:all 0.18s; }
    .admin-cancel:hover { border-color:var(--muted); color:var(--text); }
    .vis-btn { position:absolute; bottom:10px; right:10px; background:rgba(0,0,0,0.5); border:none; border-radius:6px; cursor:pointer; font-size:0.78rem; padding:3px 7px; z-index:3; transition:all 0.18s; color:#fff; }
    .vis-btn:hover { transform:scale(1.1); }
    .card.card-hidden { opacity:0.3; }
    .card.card-hidden::before { content:'숨김'; position:absolute; top:8px; left:50%; transform:translateX(-50%); background:rgba(239,68,68,0.85); color:#fff; font-size:0.62rem; font-weight:700; padding:2px 8px; border-radius:6px; z-index:3; white-space:nowrap; }
    .admin-hint { font-size:0.7rem; color:var(--muted); margin-top:8px; }

    /* NAV RIGHT */
    .nav-right { margin-left:auto; display:flex; align-items:center; gap:8px; flex-shrink:0; }
    .bm-nav-btn {
      background:rgba(251,191,36,0.07); border:1.5px solid rgba(251,191,36,0.3);
      border-radius:100px; cursor:pointer; color:#c89a25;
      font-size:0.83rem; font-weight:600; padding:5px 14px;
      white-space:nowrap; transition:all 0.18s; flex-shrink:0;
    }
    .bm-nav-btn:hover { background:rgba(251,191,36,0.14); color:#fbbf24; border-color:#fbbf24; }
    .bm-nav-btn.active { background:rgba(251,191,36,0.16); color:#fbbf24; border-color:#fbbf24; box-shadow:0 0 14px rgba(251,191,36,0.35); }

    /* BOOKMARKS GROUPING */
    .bm-cat-label { font-size:0.7rem; font-weight:700; color:var(--accent); text-transform:uppercase; letter-spacing:1.3px; margin:26px 0 10px; padding-bottom:8px; border-bottom:1px solid var(--border); }
    .bm-cat-label:first-child { margin-top:0; }
  </style>
</head>

// ── STATE ──
let currentCat='bookmarks', currentSub=null, searchQuery='', activeFilters=new Set();
let bookmarks=new Set(JSON.parse(localStorage.getItem('ai_hub_bm')||'[]'));

// ── ADMIN STATE ──
const ADMIN_PASS='leeaihub2026';
let isAdmin=sessionStorage.getItem('ai_admin')==='1';
let hiddenCards=new Set(JSON.parse(localStorage.getItem('ai_hub_hidden')||'[]'));

function getAllCards(){
  const a=[];
  Object.values(DATA).forEach(c=>Object.values(c.subs).forEach(arr=>a.push(...arr)));
  return isAdmin ? a : a.filter(c=>!hiddenCards.has(c.name));
}
function applyFiltersAndSearch(cards){
  return cards.filter(c=>{
    if(!isAdmin && hiddenCards.has(c.name)) return false;
    if(searchQuery){const q=searchQuery.toLowerCase();if(!c.name.toLowerCase().includes(q)&&!c.desc.toLowerCase().includes(q))return false;}
    for(const f of activeFilters){if(!c.filters.includes(f))return false;}
    return true;
  });
}

function renderSidebar(cat){
  const el=document.getElementById('sidebarCats');
  let html='';
  if(cat!=='bookmarks'){
    html+=`<div class="sidebar-item ${currentSub===null?'active':''}" data-sub="__all">전체</div>`;
    Object.keys(DATA[cat].subs).forEach(s=>{html+=`<div class="sidebar-item ${currentSub===s?'active':''}" data-sub="${s}">${s}</div>`;});
  }
  el.innerHTML=html;
  el.querySelectorAll('.sidebar-item[data-sub]').forEach(item=>{
    item.onclick=()=>selectSub(item.dataset.sub==='__all'?null:item.dataset.sub);
  });
}

function makeCard(c){
  const a=document.createElement('a');
  a.className='card'; a.href=c.url; a.target='_blank'; a.rel='noopener noreferrer';
  const isBm=bookmarks.has(c.name);
  const s=STARS_MAP[c.name]||3;
  const badges=c.filters.map(f=>{const L={free:'무료',ko:'한국어',api:'API',oss:'오픈소스'};return`<span class="fbadge ${f}">${L[f]}</span>`;}).join('');
  a.innerHTML=`
    <div class="card-top">
      <div class="card-icon" style="background:${c.bg}"><img class="card-favicon" src="${FAVICON(c.domain)}" alt="${c.name}"></div>
      <button class="bm-btn ${isBm?'active':''}" title="즐겨찾기">★</button>
    </div>
    <div class="card-name">${c.name}</div>
    <div class="card-stars">${stars(s)}</div>
    <div class="card-desc">${c.desc}</div>
    <div class="card-footer">
      <div class="filter-badges">${badges||`<span class="card-tag">${c.tag}</span>`}</div>
      <span class="card-arrow">→</span>
    </div>`;
  const img=a.querySelector('.card-favicon');
  img.onerror=()=>{img.style.display='none';const sp=document.createElement('span');sp.textContent=c.icon;sp.style.cssText='font-size:1.3rem';img.parentNode.appendChild(sp);};
  const btn=a.querySelector('.bm-btn');
  btn.onclick=e=>{e.preventDefault();e.stopPropagation();
    if(bookmarks.has(c.name)){bookmarks.delete(c.name);btn.classList.remove('active');}
    else{bookmarks.add(c.name);btn.classList.add('active');}
    localStorage.setItem('ai_hub_bm',JSON.stringify([...bookmarks]));
    if(currentCat==='bookmarks')renderCards('bookmarks',null);
  };
  if(isAdmin){
    const isHidden=hiddenCards.has(c.name);
    if(isHidden)a.classList.add('card-hidden');
    const vb=document.createElement('button');
    vb.className='vis-btn'; vb.title=isHidden?'공개하기':'숨기기';
    vb.textContent=isHidden?'🚫 숨김':'👁 공개';
    vb.onclick=e=>{e.preventDefault();e.stopPropagation();
      if(hiddenCards.has(c.name))hiddenCards.delete(c.name);
      else hiddenCards.add(c.name);
      localStorage.setItem('ai_hub_hidden',JSON.stringify([...hiddenCards]));
      renderCards(currentCat,currentSub);
    };
    a.appendChild(vb);
  }
  return a;
}

function renderCards(cat,sub){
  const container=document.getElementById('cardsContainer');
  container.innerHTML=''; let total=0;
  const ce=document.getElementById('searchCount');

  // 검색어 입력 시 전체 카테고리 통합 검색
  if(searchQuery){
    const allCards=applyFiltersAndSearch(getAllCards());
    total=allCards.length;
    document.getElementById('sectionTitle').textContent=`"${searchQuery}" 검색 결과`;
    document.getElementById('sectionDesc').textContent=`전체 카테고리에서 ${total}개 서비스 검색됨`;
    ce.textContent=total?`${total}개 결과`:'';
    if(!allCards.length){container.innerHTML=`<div class="empty-state"><div class="es-icon">🔍</div><h3>검색 결과가 없습니다</h3><p>다른 검색어나 필터를 시도해보세요</p></div>`;}
    else{const g=document.createElement('div');g.className='cards-grid';allCards.forEach(c=>g.appendChild(makeCard(c)));container.appendChild(g);}
    return;
  }

  if(cat==='bookmarks'){
    const filtered=applyFiltersAndSearch(getAllCards().filter(c=>bookmarks.has(c.name)));
    total=filtered.length;
    if(!filtered.length){
      container.innerHTML=`<div class="empty-state"><div class="es-icon">★</div><h3>즐겨찾기가 없습니다</h3><p>각 카드의 <strong>★</strong> 버튼을 눌러<br>자주 사용하는 서비스를 추가해보세요</p></div>`;
    } else {
      const catOf={};
      Object.values(DATA).forEach(d=>Object.values(d.subs).forEach(arr=>arr.forEach(c=>{catOf[c.name]=d.title;})));
      const groups={}, order=[];
      filtered.forEach(c=>{const g=catOf[c.name]||'기타';if(!groups[g]){groups[g]=[];order.push(g);}groups[g].push(c);});
      order.forEach(gName=>{
        const lbl=document.createElement('div');lbl.className='bm-cat-label';lbl.textContent=gName;container.appendChild(lbl);
        const g=document.createElement('div');g.className='cards-grid';
        groups[gName].forEach(c=>g.appendChild(makeCard(c)));container.appendChild(g);
      });
    }
  } else {
    const subs=DATA[cat].subs, keys=sub?[sub]:Object.keys(subs); let hasAny=false;
    keys.forEach(k=>{
      const cards=applyFiltersAndSearch(subs[k]);
      if(!cards.length)return;
      total+=cards.length; hasAny=true;
      if(!sub){const t=document.createElement('div');t.className='subcat-title';t.textContent=k;container.appendChild(t);}
      const g=document.createElement('div');g.className='cards-grid';
      cards.forEach(c=>g.appendChild(makeCard(c)));container.appendChild(g);
    });
    if(!hasAny)container.innerHTML=`<div class="empty-state"><div class="es-icon">🔍</div><h3>검색 결과가 없습니다</h3><p>다른 검색어나 필터를 시도해보세요</p></div>`;
  }
  ce.textContent=activeFilters.size?`${total}개 결과`:'';
}

function selectCat(cat){
  currentCat=cat; currentSub=null;
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.toggle('active',el.dataset.cat===cat));
  const bmBtn=document.getElementById('bmNavBtn');
  if(bmBtn) bmBtn.classList.toggle('active',cat==='bookmarks');
  if(cat==='bookmarks'){document.getElementById('sectionTitle').textContent='즐겨찾기';document.getElementById('sectionDesc').textContent='북마크한 AI 서비스 모음';}
  else{document.getElementById('sectionTitle').textContent=DATA[cat].title;document.getElementById('sectionDesc').textContent=DATA[cat].desc;}
  renderSidebar(cat); renderCards(cat,null);
}
function selectSub(sub){
  currentSub=sub;
  document.querySelectorAll('#sidebarCats .sidebar-item').forEach(el=>el.classList.toggle('active',(el.dataset.sub==='__all'?null:el.dataset.sub)===sub));
  document.getElementById('sectionTitle').textContent=sub||DATA[currentCat].title;
  renderCards(currentCat,sub);
}

document.getElementById('globalSearch').oninput=e=>{
  searchQuery=e.target.value;
  if(!searchQuery){
    if(currentCat==='bookmarks'){document.getElementById('sectionTitle').textContent='즐겨찾기';document.getElementById('sectionDesc').textContent='북마크한 AI 서비스 모음';}
    else{document.getElementById('sectionTitle').textContent=DATA[currentCat].title;document.getElementById('sectionDesc').textContent=DATA[currentCat].desc;}
    if(currentSub)document.getElementById('sectionTitle').textContent=currentSub;
  }
  renderCards(currentCat,currentSub);
};
document.querySelectorAll('.filter-opt[data-f]').forEach(el=>{
  el.onclick=()=>{const f=el.dataset.f,cb=el.querySelector('.fchk');
    if(activeFilters.has(f)){activeFilters.delete(f);el.classList.remove('active');cb.textContent='';}
    else{activeFilters.add(f);el.classList.add('active');cb.textContent='✓';}
    renderCards(currentCat,currentSub);
  };
});
document.querySelectorAll('.nav-item').forEach(el=>el.addEventListener('click',()=>selectCat(el.dataset.cat)));
document.getElementById('bmNavBtn').onclick=()=>selectCat('bookmarks');
selectCat(bookmarks.size>0?'bookmarks':'assistant');

const ADMIN_BAR_H = 36;

function updateAdminUI(){
  const lockBtn=document.getElementById('adminLockBtn');
  const bar=document.getElementById('adminBar');
  const layout=document.querySelector('.layout');
  const sidebar=document.querySelector('.sidebar');
  const searchBar=document.querySelector('.search-bar');
  if(isAdmin){
    lockBtn.textContent='🔓 관리자'; lockBtn.classList.add('is-admin');
    bar.classList.remove('hidden');
    const offset=`calc(var(--nav-h) + var(--search-h) + ${ADMIN_BAR_H}px)`;
    layout.style.marginTop=offset;
    sidebar.style.top=offset;
    sidebar.style.height=`calc(100vh - var(--nav-h) - var(--search-h) - ${ADMIN_BAR_H}px)`;
  } else {
    lockBtn.textContent='🔒 관리자'; lockBtn.classList.remove('is-admin');
    bar.classList.add('hidden');
    layout.style.marginTop='';
    sidebar.style.top=''; sidebar.style.height='';
  }
}

document.getElementById('adminLockBtn').onclick=()=>{
  if(isAdmin){
    isAdmin=false; sessionStorage.removeItem('ai_admin');
    updateAdminUI(); renderCards(currentCat,currentSub);
  } else {
    document.getElementById('adminModal').classList.remove('hidden');
    document.getElementById('adminPassInput').value='';
    document.getElementById('adminHint').textContent='';
    setTimeout(()=>document.getElementById('adminPassInput').focus(),100);
  }
};
document.getElementById('adminSubmitBtn').onclick=()=>{
  const v=document.getElementById('adminPassInput').value;
  const inp=document.getElementById('adminPassInput');
  if(v===ADMIN_PASS){
    isAdmin=true; sessionStorage.setItem('ai_admin','1');
    document.getElementById('adminModal').classList.add('hidden');
    updateAdminUI(); renderCards(currentCat,currentSub);
  } else {
    inp.classList.add('error');
    document.getElementById('adminHint').textContent='⚠️ 비밀번호가 틀렸습니다';
    setTimeout(()=>inp.classList.remove('error'),1500);
  }
};
document.getElementById('adminCancelBtn').onclick=()=>document.getElementById('adminModal').classList.add('hidden');
document.getElementById('adminPassInput').onkeydown=e=>{if(e.key==='Enter')document.getElementById('adminSubmitBtn').click();};
document.getElementById('adminModal').onclick=e=>{if(e.target===document.getElementById('adminModal'))document.getElementById('adminModal').classList.add('hidden');};
document.getElementById('adminLogoutBtn').onclick=()=>{
  isAdmin=false; sessionStorage.removeItem('ai_admin');
  updateAdminUI(); renderCards(currentCat,currentSub);
};
document.getElementById('showAllBtn').onclick=()=>{
  hiddenCards.clear(); localStorage.setItem('ai_hub_hidden','[]');
  renderCards(currentCat,currentSub);
};
updateAdminUI();
</script>
